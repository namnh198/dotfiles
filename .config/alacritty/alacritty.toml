[bell]
animation = "EaseOutExpo"
duration = 0

[env]
TERM = "xterm-256color"

[colors]
draw_bold_text_with_bright_colors = true

[cursor]
blink_interval = 750
blink_timeout = 5
unfocused_hollow = false

[cursor.style]
blinking = "Always"
shape = "Beam"

[font]
size = 13

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.glyph_offset]
x = 0
y = 0

[font.offset]
x = 0
y = 0

[font.italic]
family = "JetBrainsMono Nerd Font"

[mouse]
hide_when_typing = true

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[[keyboard.bindings]]
key = "F"
mods = "Control | Shift"
action = "ToggleFullscreen"

[terminal.shell]
program = "/bin/zsh"

[window]
decorations = "Buttonless"
dynamic_title = true
option_as_alt = "Both"
opacity = 0.8
blur = true

[window.dimensions]
columns = 120 
lines =  40

[window.padding]
x = 10
y = 10

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[general]
live_config_reload = true

import = [
  "~/.config/alacritty/themes/catppuccin-mocha.toml"
]

[terminal]


