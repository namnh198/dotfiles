add_newline = false
#format = "$directory$git_branch$git_status$fill$php$python$lua$nodejs$docker_context$jobs$cmd_duration$line_break$character"
format = """$directory$character"""
palette = "catppuccin_mocha"
# move the rest of the prompt to the right
right_format = """$all"""
scan_timeout = 1000

[character]
error_symbol = "[✗](bold red)"
success_symbol = "[➜](bold green)"

[directory]
read_only = " 󰍁"

[directory.substitutions]
'~/Developer' = 'work-project'

[fill]
symbol = " "

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style)"
symbol = " "

[golang]
format = '[  ](bold lavender)'

[docker_context]
disabled = true

[palettes.catppuccin_mocha]
base = "#1e1e2e"
blue = "#89b4fa"
crust = "#11111b"
flamingo = "#f2cdcd"
green = "#a6e3a1"
lavender = "#b4befe"
mantle = "#181825"
maroon = "#eba0ac"
mauve = "#cba6f7"
overlay0 = "#6c7086"
overlay1 = "#7f849c"
overlay2 = "#9399b2"
peach = "#fab387"
pink = "#f5c2e7"
red = "#f38ba8"
rosewater = "#f5e0dc"
sapphire = "#74c7ec"
sky = "#89dceb"
subtext0 = "#a6adc8"
subtext1 = "#bac2de"
surface0 = "#313244"
surface1 = "#45475a"
surface2 = "#585b70"
teal = "#94e2d5"
text = "#cdd6f4"
yellow = "#f9e2af"

[username]
disabled = true

[bun]
disabled = true

[nodejs]
detect_files = ['package.json', '.node-version']
